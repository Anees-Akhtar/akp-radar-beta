<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Location Sender</title>
    <link rel="stylesheet" href="css/phone.css" />
  </head>
  <body>
    <div class="card">
      <h1>📍 Location Tracker</h1>
      <p>This page sends your live location to your map.</p>
      <div id="wakelock">🔆 Screen lock: inactive</div>
      <div id="status">Press Start to begin tracking.</div>
      <button id="startBtn" onclick="startTracking()">▶️ Start Tracking</button>
      <button id="stopBtn" onclick="stopTracking()">⏹ Stop Tracking</button>
      <div id="coords"></div>
    </div>

    <script type="module" src="js/phone.js"></script>
  </body>
</html>
